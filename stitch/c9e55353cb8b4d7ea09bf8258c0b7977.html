<!DOCTYPE html>

<html class="light" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Alışkanlık Takip - Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#00685f",
                        "on-tertiary": "#ffffff",
                        "primary-container": "#008378",
                        "secondary-fixed-dim": "#9ad1cb",
                        "secondary": "#316763",
                        "surface-container-high": "#e4e9e7",
                        "on-tertiary-container": "#fffbff",
                        "inverse-primary": "#6bd8cb",
                        "on-secondary-container": "#376d69",
                        "surface": "#f5faf8",
                        "on-primary-fixed-variant": "#005049",
                        "outline": "#6d7a77",
                        "inverse-on-surface": "#edf2f0",
                        "surface-variant": "#dee4e1",
                        "tertiary-fixed-dim": "#ffb59a",
                        "on-primary-fixed": "#00201d",
                        "on-primary": "#ffffff",
                        "surface-container": "#eaefed",
                        "on-surface-variant": "#3d4947",
                        "on-error-container": "#93000a",
                        "surface-dim": "#d6dbd9",
                        "on-secondary-fixed": "#00201e",
                        "tertiary-container": "#b05e3d",
                        "surface-container-highest": "#dee4e1",
                        "surface-container-lowest": "#ffffff",
                        "background": "#f5faf8",
                        "on-surface": "#171d1c",
                        "secondary-fixed": "#b5ede7",
                        "on-tertiary-fixed-variant": "#773215",
                        "surface-container-low": "#f0f5f2",
                        "tertiary": "#924628",
                        "on-secondary-fixed-variant": "#144f4b",
                        "surface-tint": "#006a61",
                        "primary-fixed-dim": "#6bd8cb",
                        "on-primary-container": "#f4fffc",
                        "tertiary-fixed": "#ffdbce",
                        "secondary-container": "#b5ede7",
                        "surface-bright": "#f5faf8",
                        "error": "#ba1a1a",
                        "on-tertiary-fixed": "#370e00",
                        "on-background": "#171d1c",
                        "inverse-surface": "#2c3130",
                        "error-container": "#ffdad6",
                        "on-secondary": "#ffffff",
                        "outline-variant": "#bcc9c6",
                        "primary-fixed": "#89f5e7",
                        "on-error": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "16px",
                        "base": "8px",
                        "sm": "8px",
                        "container-margin": "24px",
                        "lg": "24px",
                        "2xl": "48px",
                        "xl": "32px",
                        "3xl": "64px",
                        "xs": "4px",
                        "md": "16px"
                    },
                    "fontFamily": {
                        "h3": ["Inter"],
                        "label-sm": ["Inter"],
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "h2": ["Inter"],
                        "h1": ["Inter"],
                        "body-sm": ["Inter"],
                        "label-md": ["Inter"]
                    },
                    "fontSize": {
                        "h3": ["20px", { "lineHeight": "1.4", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "label-sm": ["12px", { "lineHeight": "1", "letterSpacing": "0.04em", "fontWeight": "500" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "letterSpacing": "0", "fontWeight": "400" }],
                        "h2": ["24px", { "lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "h1": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-sm": ["14px", { "lineHeight": "1.5", "letterSpacing": "0", "fontWeight": "400" }],
                        "label-md": ["14px", { "lineHeight": "1", "letterSpacing": "0.02em", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-teal-50/80 dark:bg-slate-950/80 backdrop-blur-md docked full-width top-0 sticky border-b border-teal-100 dark:border-slate-800 flat no shadows z-40">
<div class="flex justify-between items-center w-full px-6 py-4 max-w-2xl mx-auto">
<h1 class="text-xl font-bold tracking-tight text-teal-900 dark:text-teal-50 font-inter antialiased">
                Alışkanlık Takip
            </h1>
<button class="text-teal-600 dark:text-teal-400 hover:bg-teal-100/50 dark:hover:bg-slate-800 transition-colors active:scale-95 duration-200 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow w-full max-w-2xl mx-auto px-container-margin py-xl pb-3xl relative z-10">
<!-- Input Section -->
<section class="mb-xl">
<div class="relative bg-surface-container-lowest rounded-xl shadow-[0_4px_12px_-4px_rgba(0,104,95,0.05)] border border-outline-variant focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-all flex items-center p-2">
<input class="flex-grow bg-transparent border-none focus:ring-0 text-body-md font-body-md text-on-surface placeholder:text-outline p-2 h-12 w-full outline-none" placeholder="Yeni bir alışkanlık yazın..." type="text"/>
<button class="bg-primary text-on-primary hover:bg-primary-container active:bg-on-primary-fixed-variant transition-colors rounded-lg px-md py-sm h-10 ml-2 font-label-md text-label-md shadow-sm whitespace-nowrap">
                    Ekle
                </button>
</div>
</section>
<!-- List Section -->
<section class="space-y-md">
<!-- Completed Item -->
<div class="group flex items-center bg-surface-container-lowest rounded-xl p-md border border-outline-variant shadow-[0_4px_12px_-4px_rgba(0,104,95,0.05)] transition-all hover:shadow-[0_8px_16px_-6px_rgba(0,104,95,0.1)] relative overflow-hidden">
<div class="absolute left-0 top-0 bottom-0 w-1 bg-primary"></div>
<button class="flex-shrink-0 w-6 h-6 rounded-full bg-primary text-on-primary flex items-center justify-center mr-md transition-colors shadow-sm">
<span class="material-symbols-outlined text-[16px]" data-icon="check" style="font-variation-settings: 'FILL' 1;">check</span>
</button>
<div class="flex-grow">
<p class="font-body-lg text-body-lg text-outline line-through opacity-70">Su İç</p>
</div>
<button class="flex-shrink-0 text-outline hover:text-error transition-colors p-2 rounded-full hover:bg-error-container opacity-0 group-hover:opacity-100 focus:opacity-100">
<span class="material-symbols-outlined text-[20px]" data-icon="delete">delete</span>
</button>
</div>
<!-- Pending Item 1 -->
<div class="group flex items-center bg-surface-container-lowest rounded-xl p-md border border-outline-variant shadow-[0_4px_12px_-4px_rgba(0,104,95,0.05)] transition-all hover:shadow-[0_8px_16px_-6px_rgba(0,104,95,0.1)] hover:border-primary-fixed-dim">
<button class="flex-shrink-0 w-6 h-6 rounded-full border-2 border-outline hover:border-primary text-transparent flex items-center justify-center mr-md transition-colors">
<span class="material-symbols-outlined text-[16px]" data-icon="check">check</span>
</button>
<div class="flex-grow">
<p class="font-body-lg text-body-lg text-on-surface">Kitap Oku</p>
</div>
<button class="flex-shrink-0 text-outline hover:text-error transition-colors p-2 rounded-full hover:bg-error-container opacity-0 group-hover:opacity-100 focus:opacity-100">
<span class="material-symbols-outlined text-[20px]" data-icon="delete">delete</span>
</button>
</div>
<!-- Pending Item 2 -->
<div class="group flex items-center bg-surface-container-lowest rounded-xl p-md border border-outline-variant shadow-[0_4px_12px_-4px_rgba(0,104,95,0.05)] transition-all hover:shadow-[0_8px_16px_-6px_rgba(0,104,95,0.1)] hover:border-primary-fixed-dim">
<button class="flex-shrink-0 w-6 h-6 rounded-full border-2 border-outline hover:border-primary text-transparent flex items-center justify-center mr-md transition-colors">
<span class="material-symbols-outlined text-[16px]" data-icon="check">check</span>
</button>
<div class="flex-grow">
<p class="font-body-lg text-body-lg text-on-surface">30 Dakika Yürüyüş</p>
</div>
<button class="flex-shrink-0 text-outline hover:text-error transition-colors p-2 rounded-full hover:bg-error-container opacity-0 group-hover:opacity-100 focus:opacity-100">
<span class="material-symbols-outlined text-[20px]" data-icon="delete">delete</span>
</button>
</div>
</section>
</main>
<!-- BottomNavBar (Mobile Only) -->
<nav class="md:hidden bg-white/90 dark:bg-slate-900/90 backdrop-blur-lg fixed bottom-0 w-full z-50 border-t border-slate-100 dark:border-slate-800 shadow-[0_-4px_6px_-1px_rgba(13,148,136,0.05)]">
<div class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 py-3 pb-safe">
<button class="flex flex-col items-center justify-center text-teal-600 dark:text-teal-400 bg-teal-50/50 dark:bg-teal-900/20 rounded-xl px-4 py-1 tap-highlight-transparent active:opacity-70">
<span class="material-symbols-outlined mb-1" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="text-[11px] font-medium font-inter">Bugün</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-4 py-1 hover:text-teal-500 transition-all tap-highlight-transparent active:opacity-70">
<span class="material-symbols-outlined mb-1" data-icon="insights">insights</span>
<span class="text-[11px] font-medium font-inter">İstatistik</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-4 py-1 hover:text-teal-500 transition-all tap-highlight-transparent active:opacity-70">
<span class="material-symbols-outlined mb-1" data-icon="settings">settings</span>
<span class="text-[11px] font-medium font-inter">Ayarlar</span>
</button>
</div>
</nav>
</body></html>
